<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-label="Six risk signals orbiting hybrid risk scoring">
  <defs><linearGradient id="g"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#22c55e"/></linearGradient><filter id="s"><feDropShadow stdDeviation="5" flood-color="#22c55e" flood-opacity=".55"/></filter><style>.o{transform-origin:450px 125px;animation:r 22s linear infinite}.o2{transform-origin:450px 125px;animation:r 15s linear infinite reverse}.p{animation:p 2.2s ease-in-out infinite}@keyframes r{to{transform:rotate(360deg)}}@keyframes p{50%{opacity:.45}}</style></defs>
  <rect width="900" height="250" rx="24" fill="#020617"/>
  <ellipse cx="450" cy="125" rx="330" ry="88" fill="none" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="7 8" class="o"/>
  <ellipse cx="450" cy="125" rx="240" ry="62" fill="none" stroke="#14532d" stroke-dasharray="4 9" class="o2"/>
  <g font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">
    <g class="p"><circle cx="120" cy="125" r="8" fill="#38bdf8"/><text x="120" y="151">MULTIPLE SENDERS</text></g>
    <g class="p" style="animation-delay:.35s"><circle cx="285" cy="48" r="8" fill="#22c55e"/><text x="285" y="30">RAPID TRANSFER</text></g>
    <g class="p" style="animation-delay:.7s"><circle cx="615" cy="48" r="8" fill="#38bdf8"/><text x="615" y="30">FAN-OUT</text></g>
    <g class="p" style="animation-delay:1.05s"><circle cx="780" cy="125" r="8" fill="#22c55e"/><text x="780" y="151">WALLET CHAIN</text></g>
    <g class="p" style="animation-delay:1.4s"><circle cx="615" cy="202" r="8" fill="#38bdf8"/><text x="615" y="228">FLOW IMBALANCE</text></g>
    <g class="p" style="animation-delay:1.75s"><circle cx="285" cy="202" r="8" fill="#22c55e"/><text x="285" y="228">NEW DEVICE</text></g>
  </g>
  <g filter="url(#s)"><circle cx="450" cy="125" r="54" fill="#052e2b" stroke="url(#g)" stroke-width="3"/><text x="450" y="119" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="15" font-weight="700">HYBRID</text><text x="450" y="140" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="13">RISK</text></g>
</svg>
