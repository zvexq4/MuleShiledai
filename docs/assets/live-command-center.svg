<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">MuleShield AI live command center</title>
  <desc id="desc">Animated analyst dashboard with flowing transaction signals and risk scoring</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".48" stop-color="#071426"/><stop offset="1" stop-color="#052e2b"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22c55e"/><stop offset=".55" stop-color="#f59e0b"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
    <radialGradient id="halo"><stop stop-color="#38bdf8" stop-opacity=".24"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0v36" fill="none" stroke="#38bdf8" stroke-opacity=".07"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="chart"><rect x="62" y="305" width="485" height="145" rx="12"/></clipPath>
    <style>
      .stream{stroke-dasharray:8 13;animation:stream 3s linear infinite}.stream2{stroke-dasharray:3 15;animation:stream 2s linear infinite reverse}.scan{animation:scan 4s ease-in-out infinite}.pulse{transform-box:fill-box;transform-origin:center;animation:pulse 1.8s ease-in-out infinite}.blink{animation:blink 1.5s steps(2,end) infinite}.rise{animation:rise 4s ease-in-out infinite}.bar{transform-box:fill-box;transform-origin:bottom;animation:bar 2.8s ease-in-out infinite}.dash{stroke-dasharray:420;stroke-dashoffset:420;animation:draw 4s ease-in-out infinite}.card{animation:card 4s ease-in-out infinite}.orbit{transform-origin:901px 252px;animation:orbit 12s linear infinite}.shimmer{animation:shimmer 3s linear infinite}@keyframes stream{to{stroke-dashoffset:-84}}@keyframes scan{0%,100%{transform:translateY(0);opacity:0}15%,85%{opacity:.9}50%{transform:translateY(410px)}}@keyframes pulse{50%{transform:scale(1.35);opacity:.45}}@keyframes blink{50%{opacity:.25}}@keyframes rise{50%{transform:translateY(-6px)}}@keyframes bar{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}@keyframes draw{0%{stroke-dashoffset:420}55%,100%{stroke-dashoffset:0}}@keyframes card{50%{transform:translateY(-4px)}}@keyframes orbit{to{transform:rotate(360deg)}}@keyframes shimmer{to{transform:translateX(520px)}}
    </style>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="28" fill="url(#grid)"/>
  <circle cx="1040" cy="90" r="260" fill="url(#halo)"/>
  <path d="M0 0h1200v2H0z" fill="url(#cyan)"/>

  <g font-family="Arial, sans-serif">
    <text x="42" y="48" fill="#f8fafc" font-size="16" font-weight="700" letter-spacing="3">MULESHIELD / COMMAND CENTER</text>
    <circle cx="1120" cy="42" r="5" fill="#22c55e" class="pulse"/><text x="1134" y="47" fill="#86efac" font-size="11" letter-spacing="2">ANALYSIS READY</text>
  </g>

  <g class="card" font-family="Arial, sans-serif">
    <rect x="42" y="75" width="250" height="98" rx="14" fill="#081426" stroke="#1e3a5f"/>
    <text x="62" y="102" fill="#64748b" font-size="10" letter-spacing="2">RULE ENGINE</text><text x="62" y="144" fill="#f8fafc" font-size="32" font-weight="700">60%</text>
    <path d="M165 141h100" stroke="#17304d" stroke-width="8" stroke-linecap="round"/><path d="M165 141h60" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" class="dash"/>
  </g>
  <g class="card" style="animation-delay:.35s" font-family="Arial, sans-serif">
    <rect x="310" y="75" width="250" height="98" rx="14" fill="#081426" stroke="#14532d"/>
    <text x="330" y="102" fill="#64748b" font-size="10" letter-spacing="2">ANOMALY LAYER</text><text x="330" y="144" fill="#f8fafc" font-size="32" font-weight="700">40%</text>
    <circle cx="500" cy="128" r="23" fill="none" stroke="#173d35" stroke-width="7"/><path d="M500 105a23 23 0 1 1-20 34" fill="none" stroke="#22c55e" stroke-width="7" stroke-linecap="round" class="dash"/>
  </g>
  <g class="card" style="animation-delay:.7s" font-family="Arial, sans-serif">
    <rect x="578" y="75" width="250" height="98" rx="14" fill="#081426" stroke="#713f12"/>
    <text x="598" y="102" fill="#64748b" font-size="10" letter-spacing="2">EXPLAINABILITY</text><text x="598" y="144" fill="#f8fafc" font-size="25" font-weight="700">6 SIGNALS</text>
    <g fill="#f59e0b"><circle cx="763" cy="118" r="4" class="pulse"/><circle cx="781" cy="118" r="4" class="pulse" style="animation-delay:.2s"/><circle cx="799" cy="118" r="4" class="pulse" style="animation-delay:.4s"/><circle cx="763" cy="141" r="4" class="pulse" style="animation-delay:.6s"/><circle cx="781" cy="141" r="4" class="pulse" style="animation-delay:.8s"/><circle cx="799" cy="141" r="4" class="pulse" style="animation-delay:1s"/></g>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="42" y="192" width="518" height="278" rx="16" fill="#061120" stroke="#1e293b"/>
    <text x="62" y="222" fill="#e2e8f0" font-size="13" font-weight="700">WALLET RISK VELOCITY</text><text x="500" y="222" fill="#38bdf8" font-size="10" text-anchor="end">LIVE MODEL VIEW</text>
    <path d="M62 255h465M62 300h465M62 345h465M62 390h465M62 435h465" stroke="#1e293b" opacity=".7"/>
    <g clip-path="url(#chart)">
      <path d="M62 410C105 402 125 360 165 374S225 415 270 343 340 278 382 321 438 365 475 270 520 245 550 225" fill="none" stroke="url(#risk)" stroke-width="4" class="dash" filter="url(#glow)"/>
      <path d="M62 410C105 402 125 360 165 374S225 415 270 343 340 278 382 321 438 365 475 270 520 245 550 225V470H62z" fill="url(#risk)" opacity=".08"/>
      <rect x="0" y="305" width="90" height="145" fill="url(#cyan)" opacity=".08" class="shimmer"/>
    </g>
    <g fill="#22c55e"><circle cx="165" cy="374" r="5" class="pulse"/><circle cx="270" cy="343" r="5" class="pulse" style="animation-delay:.3s"/><circle cx="382" cy="321" r="5" class="pulse" style="animation-delay:.6s"/><circle cx="475" cy="270" r="5" class="pulse" style="animation-delay:.9s"/></g>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="578" y="192" width="580" height="278" rx="16" fill="#061120" stroke="#1e293b"/>
    <text x="600" y="222" fill="#e2e8f0" font-size="13" font-weight="700">HYBRID RISK ANATOMY</text>
    <g class="orbit" fill="none" stroke="#38bdf8" opacity=".42"><ellipse cx="901" cy="252" rx="105" ry="30"/><ellipse cx="901" cy="252" rx="105" ry="30" transform="rotate(60 901 252)"/><ellipse cx="901" cy="252" rx="105" ry="30" transform="rotate(120 901 252)"/></g>
    <circle cx="901" cy="252" r="37" fill="#052e2b" stroke="#22c55e" stroke-width="3" filter="url(#glow)"/><text x="901" y="248" fill="#fff" text-anchor="middle" font-size="19" font-weight="700">78</text><text x="901" y="266" fill="#f59e0b" text-anchor="middle" font-size="9">CRITICAL</text>
    <g fill="#38bdf8"><circle cx="796" cy="252" r="5" class="pulse"/><circle cx="953" cy="161" r="5" class="pulse" style="animation-delay:.4s"/><circle cx="953" cy="343" r="5" class="pulse" style="animation-delay:.8s"/></g>
    <g transform="translate(610 326)">
      <g><rect width="76" height="108" rx="9" fill="#0b1728"/><rect x="14" y="62" width="10" height="30" rx="3" fill="#38bdf8" class="bar"/><rect x="33" y="42" width="10" height="50" rx="3" fill="#22c55e" class="bar" style="animation-delay:.3s"/><rect x="52" y="27" width="10" height="65" rx="3" fill="#f59e0b" class="bar" style="animation-delay:.6s"/><text x="38" y="103" fill="#64748b" font-size="7" text-anchor="middle">SENDERS</text></g>
      <g transform="translate(88)"><rect width="76" height="108" rx="9" fill="#0b1728"/><rect x="14" y="52" width="10" height="40" rx="3" fill="#38bdf8" class="bar"/><rect x="33" y="32" width="10" height="60" rx="3" fill="#22c55e" class="bar" style="animation-delay:.4s"/><rect x="52" y="17" width="10" height="75" rx="3" fill="#ef4444" class="bar" style="animation-delay:.8s"/><text x="38" y="103" fill="#64748b" font-size="7" text-anchor="middle">RAPID</text></g>
      <g transform="translate(176)"><rect width="76" height="108" rx="9" fill="#0b1728"/><rect x="14" y="69" width="10" height="23" rx="3" fill="#38bdf8" class="bar"/><rect x="33" y="55" width="10" height="37" rx="3" fill="#22c55e" class="bar" style="animation-delay:.5s"/><rect x="52" y="42" width="10" height="50" rx="3" fill="#f59e0b" class="bar" style="animation-delay:1s"/><text x="38" y="103" fill="#64748b" font-size="7" text-anchor="middle">FAN-OUT</text></g>
      <g transform="translate(264)"><rect width="76" height="108" rx="9" fill="#0b1728"/><rect x="14" y="72" width="10" height="20" rx="3" fill="#38bdf8" class="bar"/><rect x="33" y="63" width="10" height="29" rx="3" fill="#22c55e" class="bar" style="animation-delay:.6s"/><rect x="52" y="50" width="10" height="42" rx="3" fill="#f59e0b" class="bar" style="animation-delay:1.2s"/><text x="38" y="103" fill="#64748b" font-size="7" text-anchor="middle">CHAIN</text></g>
      <g transform="translate(352)"><rect width="76" height="108" rx="9" fill="#0b1728"/><rect x="14" y="65" width="10" height="27" rx="3" fill="#38bdf8" class="bar"/><rect x="33" y="45" width="10" height="47" rx="3" fill="#22c55e" class="bar" style="animation-delay:.7s"/><rect x="52" y="35" width="10" height="57" rx="3" fill="#ef4444" class="bar" style="animation-delay:1.4s"/><text x="38" y="103" fill="#64748b" font-size="7" text-anchor="middle">FLOW</text></g>
      <g transform="translate(440)"><rect width="76" height="108" rx="9" fill="#0b1728"/><circle cx="38" cy="52" r="22" fill="none" stroke="#17304d" stroke-width="6"/><path d="M38 30a22 22 0 1 1-19 33" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" class="dash"/><text x="38" y="103" fill="#64748b" font-size="7" text-anchor="middle">DEVICE</text></g>
    </g>
  </g>

  <rect x="20" y="65" width="2" height="28" rx="1" fill="#22c55e" class="scan" filter="url(#glow)"/>
  <path d="M20 65h1160" stroke="#22c55e" stroke-opacity=".25" class="scan"/>
  <path d="M292 124h18M560 124h18M828 124h22" stroke="url(#cyan)" stroke-width="2" class="stream"/>
</svg>
