<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">MuleShield AI</title>
  <desc id="desc">Animated fraud intelligence network</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#020617"/>
      <stop offset=".52" stop-color="#071a2c"/>
      <stop offset="1" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset=".5" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#22c55e" stop-opacity=".32"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity=".55"/></filter>
    <style>
      .dash{stroke-dasharray:10 14;animation:flow 5s linear infinite}.pulse{transform-box:fill-box;transform-origin:center;animation:pulse 2.4s ease-in-out infinite}.float{animation:float 4s ease-in-out infinite}.fade{animation:fade 4s ease-in-out infinite}.spin{transform-origin:600px 180px;animation:spin 18s linear infinite}@keyframes flow{to{stroke-dashoffset:-96}}@keyframes pulse{50%{transform:scale(1.18);opacity:.65}}@keyframes float{50%{transform:translateY(-9px)}}@keyframes fade{50%{opacity:.28}}@keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="180" cy="80" r="180" fill="url(#glow)" filter="url(#blur)" class="fade"/>
  <circle cx="1040" cy="300" r="210" fill="url(#glow)" filter="url(#blur)" class="fade"/>
  <g opacity=".18" stroke="#38bdf8">
    <path d="M0 60h1200M0 120h1200M0 180h1200M0 240h1200M0 300h1200"/>
    <path d="M120 0v360M240 0v360M360 0v360M480 0v360M600 0v360M720 0v360M840 0v360M960 0v360M1080 0v360"/>
  </g>
  <g fill="none" stroke="url(#line)" stroke-width="2" class="dash">
    <path d="M90 250C280 70 380 300 550 150S880 70 1110 205"/>
    <path d="M55 105C260 240 430 30 630 220S965 315 1150 125"/>
  </g>
  <g class="spin" fill="none" stroke="#22c55e" opacity=".45">
    <ellipse cx="600" cy="180" rx="190" ry="70"/>
    <ellipse cx="600" cy="180" rx="190" ry="70" transform="rotate(60 600 180)"/>
    <ellipse cx="600" cy="180" rx="190" ry="70" transform="rotate(120 600 180)"/>
  </g>
  <g filter="url(#shadow)" class="float">
    <path d="M600 54l82 30v69c0 66-35 116-82 147-47-31-82-81-82-147V84z" fill="#071827" stroke="#22c55e" stroke-width="4"/>
    <path d="M600 91l44 16v45c0 39-18 71-44 93-26-22-44-54-44-93v-45z" fill="#22c55e" fill-opacity=".12" stroke="#38bdf8" stroke-width="2"/>
    <path d="M578 166l15 15 32-38" fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="90" cy="250" r="6" class="pulse"/><circle cx="326" cy="181" r="5" class="pulse" style="animation-delay:.4s"/><circle cx="874" cy="119" r="5" class="pulse" style="animation-delay:.8s"/><circle cx="1110" cy="205" r="6" class="pulse" style="animation-delay:1.2s"/>
  </g>
  <text x="600" y="326" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="7">MULESHIELD AI</text>
</svg>
